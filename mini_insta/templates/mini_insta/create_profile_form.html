{% extends 'mini_insta/base.html' %}

{% block content %}

<h2>Create an Account</h2>

<div class="form-container">
    <form action="{% url 'create_profile' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- User account fields-->
        <h3>Account Details</h3>
        {{ user_creation_form.as_p }}

        <!-- Profile fields -->
        <h3>Profile Details</h3>

        <div class="form-field">
            <label for="id_username"><strong>Username</strong></label>
            {{ form.username }}
        </div>

        <div class="form-field">
            <label for="id_display_name"><strong>Display Name</strong></label>
            {{ form.display_name }}
        </div>

        <div class="form-field">
            <label for="id_bio_text"><strong>Bio</strong></label>
            {{ form.bio_text }}
        </div>

        <div class="form-field">
            <label for="id_profile_image_url"><strong>Profile Image URL</strong></label>
            {{ form.profile_image_url }}
        </div>

        <!-- Buttons -->
        <div class="form-buttons">
            <input type="submit" value="Create Account">
            <a href="{% url 'show_all_profiles' %}">
                <button type="button">Cancel</button>
            </a>
        </div>

    </form>
</div>

{% endblock %}
